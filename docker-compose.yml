version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: neihua-db
    restart: always
    environment:
      POSTGRES_USER: neihua
      POSTGRES_PASSWORD: neihua123456
      POSTGRES_DB: neihua
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - neihua-network

  # 后端 API 服务
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neihua-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=neihua
      - DB_PASSWORD=neihua123456
      - DB_DATABASE=neihua
      - JWT_SECRET=your-super-secret-jwt-key-change-this
      - AI_API_KEY=sk-cp-E4pc5MqO7GgS99LahVScShvu8mqKrTc3mFvGN_0pKTb0DARzLKeYMccmUf1QzrQvqvaOPiCtjLuY5dYqvmJrO5cDmtj7KT_dANBzEoIWaQOe6CaAfaLHd-Q
      - AI_BASE_URL=https://api.minimax.chat/v1
      - AI_MODEL=abab6.5s-chat
    depends_on:
      - postgres
    networks:
      - neihua-network

  # Nginx 反向代理（可选，推荐）
  nginx:
    image: nginx:alpine
    container_name: neihua-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - neihua-network

volumes:
  postgres_data:

networks:
  neihua-network:
    driver: bridge
